version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: moneymate_postgres_dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moneymate_dev}
      POSTGRES_USER: ${POSTGRES_USER:-moneymate_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moneymate_password}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moneymate_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - moneymate_network

  # Backend API (Development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moneymate_backend_dev
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-moneymate_user}:${POSTGRES_PASSWORD:-moneymate_password}@postgres:5432/${POSTGRES_DB:-moneymate_dev}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      ENVIRONMENT: development
    volumes:
      - ./backend/app:/app/app
      - backend_dev_data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - moneymate_network

  # Frontend (Development - Vite dev server)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: moneymate_frontend_dev
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - moneymate_network

volumes:
  postgres_dev_data:
    driver: local
  backend_dev_data:
    driver: local

networks:
  moneymate_network:
    driver: bridge
