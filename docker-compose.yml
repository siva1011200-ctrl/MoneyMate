version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: moneymate_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moneymate}
      POSTGRES_USER: ${POSTGRES_USER:-moneymate_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moneymate_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moneymate_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - moneymate_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moneymate_backend
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-moneymate_user}:${POSTGRES_PASSWORD:-moneymate_password}@postgres:5432/${POSTGRES_DB:-moneymate}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
      ENVIRONMENT: production
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - moneymate_network

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: moneymate_frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - moneymate_network

volumes:
  postgres_data:
    driver: local
  backend_data:
    driver: local

networks:
  moneymate_network:
    driver: bridge
